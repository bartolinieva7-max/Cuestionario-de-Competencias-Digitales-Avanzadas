<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Competencias Digitales Avanzadas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #fff0e6 50%, #f3e5f5 100%);
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-wrapper {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 1.2rem;
            border-bottom: 4px solid #ff8c42;
            padding-bottom: 0.7rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e6f9f, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .sub {
            color: #e67e22;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            font-weight: 600;
        }

        .progress-area {
            background: #e6e0f0;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #1a4a6e;
            font-weight: 700;
        }

        .question-counter {
            font-weight: 800;
            background: #ffcc88;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #5a3a1a;
        }

        .score-badge {
            background: #88ccaa;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            color: #1a4a2e;
        }

        .question-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.3rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #ff8c42;
            border-right: 1px solid #f0e0d0;
        }

        .question-text {
            font-size: 1.08rem;
            font-weight: 800;
            color: #2c3e66;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            background: #fefaf5;
            border: 2px solid #e0d0c0;
            transition: all 0.15s;
        }

        .option:hover {
            background: #fff4e6;
            border-color: #ffaa66;
            transform: scale(1.01);
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e67e22;
            border-radius: 50%;
            margin-top: 0.1rem;
            cursor: pointer;
            background: white;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            background-color: #e67e22;
            border-color: #e67e22;
            box-shadow: inset 0 0 0 3px white;
        }

        .option label {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            cursor: pointer;
            color: #2c3e66;
            font-weight: 600;
        }

        .feedback {
            margin-top: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #fef7e8;
            border-left: 5px solid;
            line-height: 1.4;
            color: #2c3e50;
        }

        .feedback.correct {
            border-left-color: #44aa66;
            background: #e0ffe8;
        }

        .feedback.incorrect {
            border-left-color: #ff6666;
            background: #ffe6e6;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            background: #ddd0c0;
            color: #4a3a2a;
            font-weight: 800;
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3a86ff;
            color: white;
        }

        .btn-primary:hover {
            background: #2a6ad0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #e67e22;
            color: white;
        }

        .btn-secondary:hover {
            background: #d46a10;
        }

        .btn-reset {
            background: #cc6644;
            color: white;
        }

        .btn-reset:hover {
            background: #aa4422;
        }

        .btn-success {
            background: #44aa66;
            color: white;
        }

        .btn-success:hover {
            background: #338855;
        }

        .results-area {
            margin-top: 1.5rem;
            background: #fff2e0;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 2px solid #ffaa33;
            display: none;
        }

        .results-area h3 {
            color: #cc5500;
            margin-bottom: 0.5rem;
        }

        .result-summary {
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
            color: #1f4a2e;
        }

        .result-detail {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .result-item {
            padding: 0.4rem;
            border-bottom: 1px solid #ffd9a0;
            display: flex;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            color: #aa8855;
        }

        @media (max-width: 550px) {
            .quiz-wrapper {
                padding: 1rem;
            }
            .question-text {
                font-size: 0.98rem;
            }
            .option label {
                font-size: 0.88rem;
            }
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="header">
        <h1>🛡️ Competencias Digitales Avanzadas</h1>
        <div class="sub">Ciberseguridad · Productividad · Ética · Diagnóstico integrador</div>
    </div>

    <div class="progress-area">
        <span class="question-counter" id="questionCounter">Pregunta 1 / 20</span>
        <span class="score-badge" id="liveScore">✅ Aciertos: 0</span>
    </div>

    <div id="questionContainer"></div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn btn-secondary">◀ Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente ▶</button>
        <button id="resetBtn" class="btn btn-reset">⟳ Reiniciar</button>
        <button id="finalScoreBtn" class="btn btn-success">📊 Ver total</button>
    </div>

    <div id="resultsPanel" class="results-area"></div>
    <footer>📌 Selecciona una opción → retroalimentación inmediata. Al finalizar, revisa tu puntuación.</footer>
</div>

<script>
    // ==================== DATOS DEL CUESTIONARIO (20 preguntas) ====================
    const questionsData = [
        { text: "Un sistema crítico requiere una contraseña que resista ataques de fuerza bruta por siglos. Según la escala de entropía, ¿qué configuración es técnicamente superior?",
          options: ["12 caracteres mezclando mayúsculas, minúsculas y números (70 bits de entropía).", "10 caracteres usando exclusivamente símbolos complejos y números (80 bits de entropía).", "16+ caracteres combinando variedad completa y una estructura no predecible (>100 bits).", "Una frase de 20 caracteres compuesta por palabras comunes en minúsculas (~40 bits)."],
          correct: "c",
          explanation: "Correcta (c): Solo claves de 16+ caracteres con alta variedad superan los 100 bits de entropía, garantizando resistencia por siglos frente a ataques de fuerza bruta."
        },
        { text: "Un usuario reporta que no puede ingresar a su cuenta porque no tiene señal de internet en su móvil para recibir el código MFA. Si utiliza el protocolo TOTP, ¿cuál es el diagnóstico correcto?",
          options: ["El usuario tiene razón; el protocolo TOTP requiere internet para sincronizar el código con el servidor.", "El diagnóstico es erróneo; la 'magia' del TOTP es que genera códigos locales cada 30 segundos sin necesidad de red.", "El servidor de autenticación está caído, ya que los códigos TOTP se envían por paquetes de datos.", "El código ha expirado permanentemente porque el reloj interno del móvil se desincronizó por falta de señal."],
          correct: "b",
          explanation: "Correcta (b): El código TOTP cambia cada 30 segundos sin necesidad de internet, generándose localmente en el dispositivo."
        },
        { text: "Al analizar un correo sospechoso, observa que el remitente dice 'Soporte Técnico', pero la dirección real es `admin@seguridad-cloud.ru`. ¿Qué principio de detección de phishing se está aplicando?",
          options: ["Análisis de Urgencia Artificial.", "Verificación de solicitud sensible.", "Identificación de remitente falseado mediante inspección de cabecera real.", "Diagnóstico de errores gramaticales por traducción automática."],
          correct: "c",
          explanation: "Correcta (c): Verificar la dirección completa (no solo el nombre visible) es el primer paso crítico para identificar un engaño."
        },
        { text: "Una empresa sufre un ataque de ransomware que cifra el servidor principal y el disco duro de respaldo conectado físicamente. ¿Por qué falló su estrategia si decían seguir la 'Regla 3-2-1'?",
          options: ["Porque solo tenían 2 copias en total.", "Porque no contaban con una copia 'off-site' (en la nube) aislada del hardware local.", "Porque el antivirus basado en firmas no detectó el malware.", "Porque usaron diferentes soportes físicos pero en el mismo edificio."],
          correct: "b",
          explanation: "Correcta (b): La regla 3-2-1 exige 1 copia en la nube (off-site) para protegerse de fallos físicos locales o ransomware que afecte a la red."
        },
        { text: "Un nuevo malware 'zero-day' infecta una estación de trabajo. El antivirus basado en firmas no lo detecta. ¿Qué tecnología de defensa debería haber actuado en este caso?",
          options: ["El escaneo de base de datos de malware conocido.", "El sistema de validación de datos de entrada.", "El análisis heurístico basado en el comportamiento del archivo.", "El gestor de contraseñas con aislamiento de servicios."],
          correct: "c",
          explanation: "Correcta (c): Mientras las firmas son ciegas ante amenazas nuevas, la heurística analiza comportamientos sospechosos (como cifrar miles de archivos de golpe)."
        },
        { text: "Se le solicita estandarizar el formato de un manual técnico de 200 páginas. ¿Cuál es el método técnicamente correcto para asegurar la coherencia global y la escalabilidad?",
          options: ["Usar la herramienta 'Copiar formato' en cada título manualmente.", "Aplicar estilos jerárquicos desde el Panel de Estilos para automatizar índices y navegación.", "Cambiar la fuente y tamaño de cada sección de forma independiente para evitar errores.", "Exportar el texto a un editor de código plano para eliminar metadatos."],
          correct: "b",
          explanation: "Correcta (b): Los estilos permiten modificar un atributo una vez y que todo el documento obedezca, además de generar índices automáticos."
        },
        { text: "Usted está diseñando una hoja de cálculo para capturar datos de ventas. ¿Qué herramienta debe implementar para evitar que el error humano contamine la base de datos en el origen?",
          options: ["Tablas dinámicas para resumir errores.", "Funciones lógicas `=SI()` para detectar celdas vacías.", "Validación de Datos para restringir entradas permitidas en cada celda.", "XLOOKUP para cruzar datos con una lista de errores conocidos."],
          correct: "c",
          explanation: "Correcta (c): La Validación de Datos restringe lo que se puede escribir, evitando la contaminación de la base de datos en el origen."
        },
        { text: "En un entorno de Big Data en hojas de cálculo, necesita cruzar información entre dos tablas distintas (ej. Ventas y Clientes). ¿Qué función es el equivalente técnico a un `JOIN` de SQL?",
          options: ["Tablas Dinámicas.", "Validación de Datos.", "BUSCARV / XLOOKUP.", "Formato Condicional."],
          correct: "c",
          explanation: "Correcta (c): XLOOKUP/BUSCARV es el equivalente a un JOIN básico en SQL para cruzar tablas."
        },
        { text: "Un directivo necesita ver un resumen de ingresos por país y categoría a partir de 10,000 filas de datos. ¿Qué herramienta de 'Salida Analítica' es la más eficiente?",
          options: ["Aplicar filtros manuales y sumar los resultados.", "Crear una Tabla Dinámica para agrupar y analizar sin escribir fórmulas.", "Usar macros VBA para recorrer cada fila.", "Implementar lógica condicional en cada celda de una columna nueva."],
          correct: "b",
          explanation: "Correcta (b): Las Tablas Dinámicas permiten resumir y agrupar miles de filas en segundos sin fórmulas complejas."
        },
        { text: "Al configurar permisos en un proyecto colaborativo en la nube, un profesional debe decidir el nivel de acceso para un revisor externo. ¿Cuál es la regla de oro aplicada?",
          options: ["Editor, para no entorpecer el flujo de trabajo si necesita corregir algo.", "Lector, para máxima seguridad, aunque deba enviar sus comentarios por email.", "Asignar siempre el nivel mínimo necesario (en este caso, Comentarista).", "Acceso total, confiando en la ética profesional del tercero."],
          correct: "c",
          explanation: "Correcta (c): La regla fundamental es 'asignar siempre el nivel mínimo necesario' (en este caso Comentarista)."
        },
        { text: "Un colaborador borró accidentalmente un capítulo entero hace tres días. ¿Cómo recupera la información de forma profesional en un entorno de nube?",
          options: ["Presionando `Ctrl+Z` hasta que aparezca (si el navegador sigue abierto).", "Consultando el Historial de Versiones (Auditoría) para restaurar ese punto específico.", "Solicitando al soporte de Google/Microsoft una restauración del servidor.", "Re-escribiendo el contenido basándose en el último backup físico."],
          correct: "b",
          explanation: "Correcta (b): El Historial de Versiones actúa como un control de versiones que permite recuperar secciones borradas en segundos."
        },
        { text: "Su organización requiere realizar informes técnicos extremadamente complejos, con macros avanzadas y uso intensivo de aplicaciones de escritorio nativas. ¿Qué ecosistema es el adecuado?",
          options: ["Google Workspace.", "Software Libre (LibreOffice).", "Microsoft 365.", "Aplicaciones basadas puramente en navegador."],
          correct: "c",
          explanation: "Correcta (c): Microsoft 365 es ideal para informes complejos y potencia de escritorio con macros avanzadas."
        },
        { text: "Una empresa decide usar software bajo licencia MIT en lugar de uno con licencia EULA. ¿Cuál es la implicación técnica principal?",
          options: ["El software MIT es gratuito, mientras que el EULA siempre es de pago.", "La licencia MIT permite estudiar y modificar el código fuente; la EULA tiene restricciones legales de uso.", "El software MIT no tiene soporte técnico, a diferencia del comercial.", "La licencia EULA permite la piratería en entornos corporativos para ahorrar costos."],
          correct: "b",
          explanation: "Correcta (b): MIT (software libre) permite estudiar y modificar el código; EULA impone restricciones legales de uso."
        },
        { text: "Un técnico es contratado para recuperar datos de un disco duro dañado. Al acceder a los archivos, encuentra fotos privadas del cliente. Según la ética profesional, ¿cuál es la conducta correcta?",
          options: ["Revisar las fotos para asegurar que no hay archivos corruptos que afecten al sistema operativo.", "Entender que el acceso técnico nunca autoriza el acceso informativo ('Ver no es leer').", "Hacer una copia de seguridad de las fotos en su propio drive por si el cliente las pierde.", "Ignorar la privacidad, ya que el técnico tiene 'derecho de administrador' sobre los datos."],
          correct: "b",
          explanation: "Correcta (b): La 'Regla de Oro de la Confidencialidad' establece que el poder técnico no otorga derecho informativo."
        },
        { text: "Un reclutador técnico decide no contratar a un candidato tras revisar su actividad en GitHub y foros de programación de hace 4 años. ¿Qué concepto técnico justifica esta acción?",
          options: ["El derecho al olvido digital.", "La huella digital profesional como currículum extendido.", "La falta de competencias en ciberseguridad del candidato.", "El uso inadecuado de herramientas de colaboración en la nube."],
          correct: "b",
          explanation: "Correcta (b): Lo que se publica en redes y foros construye la reputación y puede cerrar puertas en procesos de selección (huella digital profesional)."
        },
        { text: "En el mundo corporativo, ¿por qué la piratería de software no se considera 'ahorro', sino un riesgo crítico?",
          options: ["Porque el software pirata no permite usar macros avanzadas.", "Porque genera una infracción legal con consecuencias penales para la empresa y el técnico.", "Porque ocupa más espacio de almacenamiento base que el software legal.", "Porque impide la colaboración nativa en la nube."],
          correct: "b",
          explanation: "Correcta (b): En el entorno profesional, la piratería conlleva consecuencias penales y riesgos legales graves."
        },
        { text: "Usted debe decidir entre Google Apps Script y Macros VBA para automatizar un flujo. ¿Cuál es el criterio de decisión basado en el ecosistema?",
          options: ["Google Apps Script si el proyecto es nativo web y requiere colaboración rápida.", "VBA si se requiere trabajar exclusivamente en dispositivos móviles.", "Google Apps Script para informes técnicos complejos con 1TB de datos.", "VBA para startups que no tienen presupuesto para licencias."],
          correct: "a",
          explanation: "Correcta (a): Google Apps Script se asocia con Google Workspace para proyectos web colaborativos; VBA con Microsoft 365 para entornos complejos."
        },
        { text: "¿Cuál es la diferencia fundamental entre un 'usuario' y un 'profesional técnico' según el material?",
          options: ["El profesional sabe usar más botones que el usuario promedio.", "El profesional opera bajo principios de protección, optimización y ética, pensando en vulnerabilidades.", "El profesional solo utiliza herramientas de pago, mientras que el usuario usa herramientas gratuitas.", "El usuario se enfoca en la nube y el profesional en el hardware físico únicamente."],
          correct: "b",
          explanation: "Correcta (b): El profesional piensa en términos de seguridad, productividad y ética, no solo en 'usar botones'."
        },
        { text: "Un mensaje de alerta dice: 'Su cuenta será suspendida en 24 horas. Haga clic aquí'. ¿Qué táctica psicológica de phishing se está empleando para bloquear el pensamiento crítico?",
          options: ["Falsificación de URL.", "Solicitud sensible.", "Urgencia Artificial.", "Error gramatical intencionado."],
          correct: "c",
          explanation: "Correcta (c): La 'Urgencia Artificial' fuerza decisiones rápidas y evita el análisis crítico."
        },
        { text: "Al finalizar un proyecto, se le pide redactar un 'Plan de Rescate'. ¿Qué elementos deben integrarse obligatoriamente según el modelo del profesional del siglo XXI?",
          options: ["Solo la lista de contraseñas de los usuarios.", "Un esquema de backups 3-2-1, asignación de permisos mínimos y justificación de licencias legales.", "Una comparativa de precios entre Google y Microsoft.", "El historial de versiones de los últimos 10 años."],
          correct: "b",
          explanation: "Correcta (b): El proyecto integrador une productividad (datos), seguridad (backups 3-2-1) y ética (licencias legales y permisos mínimos)."
        }
    ];

    let userAnswers = new Array(20).fill(null);
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const finalScoreBtn = document.getElementById('finalScoreBtn');
    const questionCounterSpan = document.getElementById('questionCounter');
    const liveScoreSpan = document.getElementById('liveScore');
    const resultsPanel = document.getElementById('resultsPanel');

    function updateLiveScore() {
        let correctCount = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] && userAnswers[i] === questionsData[i].correct) correctCount++;
        }
        liveScoreSpan.textContent = `✅ Aciertos: ${correctCount} / 20`;
        return correctCount;
    }

    function saveAnswer(selectedLetter) {
        userAnswers[currentIndex] = selectedLetter;
        updateLiveScore();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        const q = questionsData[currentIndex];
        const selected = userAnswers[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const isChecked = (selected === letter);
            optionsHtml += `
                <div class="option" data-letter="${letter}">
                    <input type="radio" name="question" value="${letter}" id="opt_${letter}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${letter}"><strong>${letter.toUpperCase()})</strong> ${opt}</label>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (selected) {
            const isCorrect = (selected === q.correct);
            const correctLetter = q.correct;
            const correctText = q.options[letters.indexOf(correctLetter)];
            const explanation = q.explanation;
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ <strong>¡Correcto!</strong> ${explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback incorrect">❌ <strong>Incorrecto.</strong> La respuesta correcta es ${correctLetter.toUpperCase()}) ${correctText}.<br>${explanation}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback" style="border-left-color:#ffcc88; background:#fff5e6;">⚡ Selecciona una opción para ver la retroalimentación.</div>`;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
            </div>
        `;
        questionContainer.innerHTML = html;

        // Event listeners
        const optionDivs = document.querySelectorAll('.option');
        optionDivs.forEach(div => {
            const radio = div.querySelector('input[type="radio"]');
            const letter = div.getAttribute('data-letter');
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) saveAnswer(letter);
                });
            }
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const radioInside = div.querySelector('input');
                    if (radioInside && !radioInside.checked) {
                        radioInside.checked = true;
                        saveAnswer(letter);
                    }
                }
            });
        });

        questionCounterSpan.textContent = `Pregunta ${currentIndex+1} / 20`;
    }

    function showFinalResults() {
        let correctCount = 0;
        let detailsHtml = '';
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const userAns = userAnswers[i];
            const isCorrect = (userAns === q.correct);
            if (isCorrect) correctCount++;
            const statusIcon = isCorrect ? '✅' : '❌';
            const userShow = userAns ? userAns.toUpperCase() : '—';
            const correctShow = q.correct.toUpperCase();
            detailsHtml += `
                <div class="result-item">
                    <span style="min-width: 30px;">${statusIcon}</span>
                    <span><strong>Pregunta ${i+1}</strong> (Tu respuesta: ${userShow} / Correcta: ${correctShow})</span>
                </div>
            `;
        }
        const percent = Math.round((correctCount / 20) * 100);
        resultsPanel.innerHTML = `
            <h3>📊 Resultado final</h3>
            <div class="result-summary">🎯 Aciertos: ${correctCount} de 20 (${percent}%)</div>
            <div class="result-detail">${detailsHtml}</div>
            <button id="closeResultsBtn" class="btn btn-secondary" style="margin-top: 10px; width:100%;">✖ Cerrar resumen</button>
        `;
        resultsPanel.style.display = 'block';
        document.getElementById('closeResultsBtn')?.addEventListener('click', () => {
            resultsPanel.style.display = 'none';
        });
        alert(`📊 Cuestionario completado.\nAciertos: ${correctCount} de 20 (${percent}%)\nRevisa el resumen detallado en pantalla.`);
    }

    function nextQuestion() {
        if (currentIndex < 19) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (confirm(`Aún tienes ${unanswered} pregunta(s) sin responder. ¿Deseas finalizar de todas formas? Las no respondidas se contarán como incorrectas.`)) {
                    showFinalResults();
                }
            } else {
                showFinalResults();
            }
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            alert("Ya estás en la primera pregunta.");
        }
    }

    function resetQuiz() {
        if (confirm("¿Reiniciar todo el cuestionario? Se perderán todas las respuestas.")) {
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;
            resultsPanel.style.display = 'none';
            updateLiveScore();
            renderCurrentQuestion();
        }
    }

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);
    finalScoreBtn.addEventListener('click', showFinalResults);

    renderCurrentQuestion();
    updateLiveScore();
</script>
</body>
</html>
